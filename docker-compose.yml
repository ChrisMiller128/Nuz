version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuzlocke_hub
      POSTGRES_USER: nuzlocke
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nuzlocke_secret_changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuzlocke -d nuzlocke_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: "postgresql://nuzlocke:${DB_PASSWORD:-nuzlocke_secret_changeme}@db:5432/nuzlocke_hub?schema=public"
      NEXTAUTH_URL: "https://nuzlocke.emulator.st"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_this_to_a_secure_random_string}
      NODE_ENV: production
      STORAGE_BASE_ROMS: /app/storage/base-roms
      STORAGE_GENERATED_ROMS: /app/storage/generated-roms
      STORAGE_SAVES: /app/storage/saves
      STORAGE_SCREENSHOTS: /app/storage/screenshots
      STORAGE_TMP: /app/storage/tmp
    volumes:
      - app_storage:/app/storage

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://nuzlocke:${DB_PASSWORD:-nuzlocke_secret_changeme}@db:5432/nuzlocke_hub?schema=public"
    command: npx prisma db push --accept-data-loss
    profiles:
      - migrate

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://nuzlocke:${DB_PASSWORD:-nuzlocke_secret_changeme}@db:5432/nuzlocke_hub?schema=public"
    command: npx tsx scripts/seed.ts
    profiles:
      - seed

volumes:
  postgres_data:
  app_storage:
